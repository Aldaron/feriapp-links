<!DOCTYPE html>
<html lang="es">
<head>
    <meta property="og:title" content="FeriApp 💃">
    <meta property="og:description" content="La biblioteca definitiva de sevillanas para tu bolsillo. Letras, Spotify, favoritos y mucho más.">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FeriApp - Redirigiendo...</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #fdf2f2; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; }
        .container { max-width: 450px; padding: 20px; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #d32f2f; border-radius: 50%; width: 35px; height: 35px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .btn { display: none; margin-top: 20px; padding: 12px 25px; background-color: #d32f2f; color: white; text-decoration: none; border-radius: 25px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div style="font-size: 4rem;">💃</div>
        <h1 style="color: #d32f2f; font-size: 1.8rem;">Abriendo FeriApp...</h1>
        <p id="status-text">Buscando la letra en la biblioteca...</p>
        <div class="loader"></div>
        <a id="btn-manual" href="#" class="btn">ENTRAR MANUALMENTE</a>
    </div>

   <script>
        (function() {
            const URL_RASPBERRY = "https://feria.aldaron.es";
            const URL_PLAYSTORE = "https://play.google.com/store/apps/details?id=es.aldaron.feriapp";
            
            const path = window.location.pathname;
            const search = window.location.search; // Pillamos también parámetros si los hubiera
            const isAndroid = /android/i.test(navigator.userAgent);
            
            let destinoFinal = "";

            if (isAndroid) {
                // 1. SI ES ANDROID: Siempre a la tienda.
                destinoFinal = URL_PLAYSTORE + "&referrer=" + encodeURIComponent(path + search);
            } 
            else {
                // 2. SI ES IOS / PC: Comprobamos qué nos han compartido
                if (path.includes('/s/')) {
                    const mascara = path.split('/s/')[1].replace('/', '');
                    destinoFinal = `${URL_RASPBERRY}/Home/DetallePorMascara?m=${mascara}`;
                } 
                else if (path.includes('/f/')) {
                    const mascara = path.split('/f/')[1].replace('/', '');
                    destinoFinal = `${URL_RASPBERRY}/Home/FavoritosCompartidos?m=${mascara}`;
                } 
                else {
                    // Raíz o desconocido
                    destinoFinal = URL_RASPBERRY;
                }
            }

            // Redirección automática
            window.location.replace(destinoFinal);

            // Botón de auxilio
            setTimeout(() => {
                document.getElementById('status-text').innerText = isAndroid 
                    ? "Si no se abre la tienda, pulsa aquí:" 
                    : "Si no has entrado ya, pulsa el botón:";
                
                const btn = document.getElementById('btn-manual');
                btn.innerText = isAndroid ? "DESCARGAR APP" : "ENTRAR MANUALMENTE";
                btn.href = destinoFinal;
                btn.style.display = "inline-block";
            }, 3000);
        })();
    </script>
</body>
</html>
