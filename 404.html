<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FeriApp - Tu guía de Sevillanas</title>
    <meta http-equiv="refresh" content="3; url=https://play.google.com/store/apps/details?id=es.aldaron.feriapp&hl=es_419">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fdf2f2;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            max-width: 500px;
            padding: 20px;
        }
        .logo {
            font-size: 4rem;
            margin-bottom: 10px;
        }
        h1 {
            color: #d32f2f;
            font-size: 2.2rem;
            margin-bottom: 10px;
        }
        p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #555;
        }
        .highlight {
            color: #2e7d32;
            font-weight: bold;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #d32f2f;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .btn {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 30px;
            background-color: #d32f2f;
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            transition: transform 0.2s;
        }
        .btn:hover { transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">💃</div>
        <h1>¡Ya casi estamos!</h1>
        <p>Estás intentando abrir una sevillana FeriApp, pero necesitas nuestra <span class="highlight">aplicación</span> para no perderte ni un compás.</p>
        <p>Con <strong>FeriApp</strong> tendrás letras, integración con Spotify y tus favoritos siempre a mano.</p>
        
        <div class="loader"></div>
        <p style="font-size: 0.9rem; color: #888;">Redirigiéndote a la Play Store...</p>

        <a href="https://play.google.com/store/apps/details?id=es.aldaron.feriapp&hl=es_419" class="btn">DESCARGAR FERIAPP</a>
    </div>

    <script>
        // Si la redirección meta falla o es bloqueada, lanzamos el JS a los 3 segundos
        setTimeout(function() {
            window.location.href = "https://play.google.com/store/apps/details?id=es.aldaron.feriapp&hl=es_419";
        }, 5000);
    </script>
</body>
</html>
