<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta property="og:title" content="FeriApp 💃">
    <meta property="og:description" content="La biblioteca definitiva de sevillanas para tu bolsillo. Letras, Spotify, favoritos y mucho más.">
    
    <title>FeriApp - Tu guía de Sevillanas</title>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fdf2f2;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            max-width: 500px;
            padding: 20px;
        }
        .logo {
            font-size: 4.5rem;
            margin-bottom: 15px;
        }
        h1 {
            color: #d32f2f;
            font-size: 2.2rem;
            margin-bottom: 10px;
        }
        p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #555;
        }
        .highlight {
            color: #2e7d32;
            font-weight: bold;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #d32f2f;
            border-radius: 50%;
            width: 35px;
            height: 35px;
            animation: spin 1s linear infinite;
            margin: 25px auto 15px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .btn {
            display: none; /* Se activa por JS */
            margin-top: 20px;
            padding: 14px 35px;
            background-color: #d32f2f;
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(211, 47, 47, 0.3);
        }
        .btn:hover { 
            transform: scale(1.05); 
            background-color: #b71c1c; 
            box-shadow: 0 6px 12px rgba(211, 47, 47, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">💃</div>
        <h1 id="main-title">Abriendo FeriApp...</h1>
        <p id="main-desc" style="font-size: 1rem; color: #888;">Buscando la letra en la biblioteca...</p>
        
        <div class="loader"></div>
        <p id="status-text" style="font-size: 0.9rem; color: #888; margin-top: 0;"></p>

        <a id="btn-manual" href="#" class="btn">ENTRAR MANUALMENTE</a>
    </div>

   <script>
        (function() {
            const URL_RASPBERRY = "https://feria.aldaron.es";
            const URL_PLAYSTORE = "https://play.google.com/store/apps/details?id=es.aldaron.feriapp";
            
            const path = window.location.pathname;
            const search = window.location.search; // Pillamos también parámetros si los hubiera
            const isAndroid = /android/i.test(navigator.userAgent);
            
            let destinoFinal = "";

            if (isAndroid) {
                // 1. SI ES ANDROID: Siempre a la tienda.
                // Le añadimos la ruta en el referrer por si luego quieres saber de dónde venía.
                destinoFinal = URL_PLAYSTORE + "&referrer=" + encodeURIComponent(path + search);
            } 
            else {
                // 2. SI ES IOS / PC: Traducimos la URL corta a la URL que entiende tu servidor (C# MVC)
                if (path.includes('/s/')) {
                    const mascara = path.split('/s/')[1].replace('/', '');
                    destinoFinal = `${URL_RASPBERRY}/Home/DetallePorMascara?m=${mascara}`;
                } 
                else if (path.includes('/f/')) {
                    const mascara = path.split('/f/')[1].replace('/', '');
                    destinoFinal = `${URL_RASPBERRY}/Home/FavoritosCompartidos?m=${mascara}`;
                } 
                else {
                    // Raíz o desconocido
                    destinoFinal = URL_RASPBERRY;
                }
            }

            // Redirección automática inmediata
            window.location.replace(destinoFinal);

            // Botón de auxilio por si el navegador bloquea el auto-redirect
            setTimeout(() => {
                document.getElementById('status-text').innerText = isAndroid 
                    ? "Si no se abre la tienda, pulsa aquí:" 
                    : "Si no has entrado ya, pulsa el botón:";
                
                const btn = document.getElementById('btn-manual');
                btn.innerText = isAndroid ? "DESCARGAR APP" : "ENTRAR A FERIAPP WEB";
                btn.href = destinoFinal;
                btn.style.display = "inline-block";
            }, 3000);
        })();
    </script>
</body>
</html>
